﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>

    <title>智慧校园综合服务平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/robot-assistant.css">
</head>
<body style="overflow:hidden">
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-university"></i>
                <span>智慧校园</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link active">首页</a>
                <a href="secondhand.html" class="nav-link">二手市场</a>
                <a href="life.html" class="nav-link">生活服务</a>

            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle">

            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>

    <section class="hero">

                <div class="hero-buttons">
                    <a href="secondhand.html" class="btn primary-btn">

            </div>
            <div class="hero-visual">
                <div class="floating-card card-1" onclick="location.href='life.html'">

                </div>
