﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的租用订单 - 智慧校园二手市场</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/secondhand.css">
<link rel="stylesheet" href="css/robot-assistant.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-university"></i>
                <span>智慧校园</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="secondhand.html" class="nav-link active">二手市场</a>
                <a href="life.html" class="nav-link">生活服务</a>
                <a href="booking.html" class="nav-link">场馆预约</a>
                <a href="parttime.html" class="nav-link">兼职互助</a><a href="pets.html" class="nav-link">流浪猫寄养</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="sh-nav-links">
                    <a href="orders.html" class="sh-nav-link" title="我的订单" style="color:var(--primary-light)"><i class="fas fa-receipt"></i></a>
                    <a href="purchases.html" class="sh-nav-link" title="我的购买记录"><i class="fas fa-shopping-bag"></i></a>
                </div>
                <a href="login.html" class="login-btn">登录</a>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="sh-page-container" style="padding-top:90px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
            <h1 class="sh-page-title" style="margin-bottom:0"><i class="fas fa-receipt" style="color:#f97316"></i> 我的租用订单</h1>
            <span id="orderCount" style="color:var(--text-secondary);font-size:14px"></span>
        </div>
        <div id="orderList" class="sh-order-list"></div>
    </div>

    <div class="sh-toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg"></span>
    </div>

    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        function getCurrentUser() {
            if (window.CampusDB) return CampusDB.getCurrentUser();
            try { return JSON.parse(localStorage.getItem('campus_current_user') || 'null'); } catch(e) { return null; }
        }
        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        var user = getCurrentUser();
        var listEl = document.getElementById('orderList');
        var countEl = document.getElementById('orderCount');

        /* ========== 测试订单数据（教材租用） ========== */
        var testOrders = [
            {
                id: 9001,
                productName: '高等数学（第七版）上册',
                productImg: 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400&h=300&fit=crop',
                seller: '张同学',
                sellerDept: '数学与统计学院',
                rentStart: '2026-06-01',
                rentEnd: '2026-08-30',
                days: 90,
                price: 5,
                totalPrice: 15,
                status: '已租用',
                building: '北区1号楼',
                note: '含课后习题答案',
                time: '2026-06-01 09:30'
            },
            {
                id: 9002,
                productName: '大学物理实验教程',
                productImg: 'https://images.unsplash.com/photo-1532012197267-da84d127e765?w=400&h=300&fit=crop',
                seller: '李同学',
                sellerDept: '物理与电子学院',
                rentStart: '2026-06-03',
                rentEnd: '2026-08-30',
                days: 88,
                price: 5,
                totalPrice: 15,
                status: '待确认',
                building: '南区2号楼',
                note: '',
                time: '2026-06-03 14:15'
            },
            {
                id: 9003,
                productName: '新视野大学英语读写教程3',
                productImg: 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400&h=300&fit=crop',
                seller: '王同学',
                sellerDept: '外国语学院',
                rentStart: '2026-05-20',
                rentEnd: '2026-07-20',
                days: 60,
                price: 3,
                totalPrice: 9,
                status: '已归还',
                building: '东区1号楼',
                note: '有笔记标注',
                time: '2026-05-20 10:00'
            }
        ];

        /* ========== 读取用户真实订单 ========== */
        function getUserOrders() {
            var allOrders = [];
            try { allOrders = JSON.parse(localStorage.getItem('campus_rental_orders') || '[]'); } catch(e) {}
            if (!user) return allOrders;
            /* 筛选当前用户的订单 */
            var myOrders = allOrders.filter(function(o) {
                return o.buyerStuId === user.stuId || o.buyer === user.name;
            });
            return myOrders;
        }

        function getStatusClass(status) {
            if (status === '待确认') return 'pending';
            if (status === '已租用' || status === '待配送') return 'shipped';
            if (status === '已归还') return 'completed';
            return 'pending';
        }

        function getStatusIcon(status) {
            if (status === '待确认') return 'fa-clock';
            if (status === '已租用' || status === '待配送') return 'fa-handshake';
            if (status === '已归还') return 'fa-check-circle';
            return 'fa-circle';
        }

        function renderOrderCard(order) {
            var card = document.createElement('div');
            card.className = 'sh-order-card';
            var img = order.productImg || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop';
            var name = order.productName || order.name || '未知商品';
            var price = order.price || 0;
            var days = order.days || 1;
            var totalPrice = order.totalPrice || (price * days);
            var seller = order.seller || '未知';
            var sellerDept = order.sellerDept || '';
            var rentStart = order.rentStart || '';
            var rentEnd = order.rentEnd || '';
            var building = order.building || '';
            var note = order.note || '';
            var time = order.time || '';
            var status = order.status || '待确认';

            card.innerHTML =
                '<div class="sh-order-img"><img src="' + img + '" alt="' + name + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div style=&quot;display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:var(--bg-secondary);color:var(--text-secondary)&quot;><i class=&quot;fas fa-box&quot; style=&quot;font-size:24px&quot;></i></div>\'"></div>' +
                '<div class="sh-order-info">' +
                    '<h3>' + name + '</h3>' +
                    '<div class="sh-order-meta">' +
                        '<div><i class="fas fa-user"></i> 出租方：' + seller + (sellerDept ? '（' + sellerDept + '）' : '') + '</div>' +
                        (rentStart ? '<div><i class="fas fa-calendar-alt"></i> 租用时间：' + rentStart + ' 至 ' + rentEnd + '</div>' : '') +
                        '<div><i class="fas fa-coins"></i> 租金：¥' + price + '/天' + (days ? ' × ' + days + '天 = <strong style="color:#f97316">¥' + totalPrice + '</strong>' : '') + '</div>' +
                        (building ? '<div><i class="fas fa-map-marker-alt"></i> 配送至：' + building + '</div>' : '') +
                        (note ? '<div><i class="fas fa-sticky-note"></i> 备注：' + note + '</div>' : '') +
                        (time ? '<div><i class="fas fa-clock"></i> 下单时间：' + time + '</div>' : '') +
                    '</div>' +
                '</div>' +
                '<span class="sh-order-status ' + getStatusClass(status) + '"><i class="fas ' + getStatusIcon(status) + '"></i> ' + status + '</span>';
            return card;
        }

        function renderOrders() {
            listEl.innerHTML = '';

            /* 先渲染用户真实订单 */
            var userOrders = getUserOrders();
            userOrders.forEach(function(order) {
                listEl.appendChild(renderOrderCard(order));
            });

            /* 再渲染测试订单 */
            testOrders.forEach(function(order) {
                listEl.appendChild(renderOrderCard(order));
            });

            var total = userOrders.length + testOrders.length;
            if (countEl) countEl.textContent = '共 ' + total + ' 笔订单';
        }

        if (!user) {
            listEl.innerHTML = '<div class="sh-page-empty" style="text-align:center;padding:60px 20px"><i class="fas fa-lock" style="font-size:48px;color:#d1d5db;margin-bottom:16px;display:block"></i><p style="color:var(--text-secondary);font-size:15px;margin-bottom:16px">请先登录后查看订单</p><a href="login.html" style="display:inline-block;padding:10px 24px;border-radius:8px;background:var(--primary-light);color:#fff;text-decoration:none;font-size:14px">去登录</a></div>';
            if (countEl) countEl.textContent = '';
            return;
        }

        renderOrders();
    });
    </script>
<script src="js/robot-assistant.js"></script>
</body>
</html>
