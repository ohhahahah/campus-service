<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食堂管理员登录 - 青园在线</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dining-admin.css">
    <style>
        /* 登录页专属样式 */
        .dal-page {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 50%, #fed7aa 100%);
            position: relative;
            overflow: hidden;
        }
        .dal-page::before {
            content: '';
            position: absolute;
            top: -100px; right: -100px;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(234,88,12,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .dal-page::after {
            content: '';
            position: absolute;
            bottom: -80px; left: -80px;
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(245,158,11,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .dal-card {
            position: relative;
            z-index: 1;
            background: #fff;
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(124,45,18,0.15);
            border: 1px solid rgba(234,88,12,0.1);
        }
        .dal-icon {
            width: 80px; height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #c2410c, #ea580c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(234,88,12,0.4);
        }
        .dal-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #7c2d12;
            margin-bottom: 6px;
        }
        .dal-subtitle {
            text-align: center;
            font-size: 13px;
            color: #9a3412;
            opacity: 0.7;
            margin-bottom: 28px;
        }
        .dal-form-group {
            margin-bottom: 18px;
        }
        .dal-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #7c2d12;
            margin-bottom: 8px;
        }
        .dal-label i { margin-right: 6px; color: #ea580c; }
        .dal-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #fed7aa;
            border-radius: 10px;
            font-size: 14px;
            color: #7c2d12;
            background: #fff7ed;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
            box-sizing: border-box;
        }
        .dal-input:focus {
            border-color: #ea580c;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(234,88,12,0.1);
        }
        .dal-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            background: linear-gradient(135deg, #fff7ed, #ffedd5);
            border-radius: 10px;
            font-size: 12px;
            color: #9a3412;
            margin-bottom: 22px;
            border: 1px dashed rgba(234,88,12,0.3);
        }
        .dal-hint i { color: #f59e0b; }
        .dal-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c2410c, #ea580c);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(234,88,12,0.35);
        }
        .dal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(234,88,12,0.45);
        }
        .dal-btn:active { transform: translateY(0); }
        .dal-back {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #9a3412;
            text-decoration: none;
            transition: color 0.2s;
        }
        .dal-back:hover { color: #ea580c; }
        .dal-back i { margin-right: 4px; }
        /* Toast */
        .dal-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-30px);
            background: #7c2d12;
            color: #fff;
            padding: 12px 26px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .dal-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .dal-toast.error { background: #dc2626; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="dining.html" class="da-back-btn" title="返回餐饮服务"><i class="fas fa-arrow-left"></i> 返回餐饮服务</a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="life.html" class="nav-link">生活服务</a>
                <a href="dining.html" class="nav-link active">餐饮服务</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <div class="da-staff-badge"><i class="fas fa-concierge-bell"></i> 食堂管理员</div>
            </div>
            <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <!-- 登录主体 -->
    <section class="dal-page">
        <div class="dal-card">
            <div class="dal-icon"><i class="fas fa-concierge-bell"></i></div>
            <h1 class="dal-title">食堂管理员登录</h1>
            <p class="dal-subtitle">身份校验后进入食堂工作台</p>

            <div class="dal-hint">
                <i class="fas fa-shield-alt"></i>
                <span>当前已预设账号密码，点击下方"一键登录"即可</span>
            </div>

            <div class="dal-form-group">
                <label class="dal-label"><i class="fas fa-id-badge"></i> 管理员账号</label>
                <input type="text" class="dal-input" id="loginAccount" value="canteen_admin" autocomplete="off" readonly>
            </div>
            <div class="dal-form-group">
                <label class="dal-label"><i class="fas fa-key"></i> 登录密码</label>
                <input type="password" class="dal-input" id="loginPassword" value="123456" readonly>
            </div>

            <button type="button" class="dal-btn" id="oneClickLoginBtn">
                <i class="fas fa-sign-in-alt"></i> 一键登录
            </button>

            <a href="dining.html" class="dal-back"><i class="fas fa-arrow-left"></i> 返回学生端</a>
        </div>
    </section>

    <!-- Toast -->
    <div class="dal-toast" id="dalToast">
        <i class="fas fa-check-circle"></i>
        <span id="dalToastMsg">操作成功</span>
    </div>

    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('oneClickLoginBtn').addEventListener('click', function() {
            var account = document.getElementById('loginAccount').value.trim();
            var password = document.getElementById('loginPassword').value.trim();

            /* 预设校验 */
            if (account === 'canteen_admin' && password === '123456') {
                /* 记录登录态 */
                try {
                    localStorage.setItem('campus_dining_admin_logged', '1');
                    localStorage.setItem('campus_dining_admin_name', '食堂管理员');
                } catch(e) {}
                showToast('登录成功，正在进入工作台...', 'success');
                setTimeout(function() {
                    window.location.href = 'dining-admin.html';
                }, 800);
            } else {
                showToast('账号或密码错误，请使用预设账号', 'error');
            }
        });

        function showToast(msg, type) {
            var toast = document.getElementById('dalToast');
            var msgEl = document.getElementById('dalToastMsg');
            msgEl.textContent = msg;
            toast.className = 'dal-toast show' + (type === 'error' ? ' error' : '');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
