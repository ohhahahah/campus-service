<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的购买记录 - 青园在线二手市场</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/secondhand.css">
    <link rel="stylesheet" href="css/robot-assistant.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo"><svg class="brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="青园在线"><defs><linearGradient id="qyArc" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#7DF0D9"/><stop offset="0.55" stop-color="#2DD4BF"/><stop offset="1" stop-color="#0891B2"/></linearGradient><radialGradient id="qyCore" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.6" stop-color="#A8F0E0"/><stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/></radialGradient><radialGradient id="qyDot" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#38BDF8"/></radialGradient></defs><circle class="brand-wave" cx="20" cy="20" r="16" stroke="url(#qyArc)" stroke-width="1.2" fill="none" opacity="0.4"/><path d="M9 14 H31" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><path d="M7 20 H33" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><path d="M9 26 H31" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><circle cx="20" cy="20" r="2.5" fill="url(#qyCore)" class="brand-core"/><circle class="brand-pulse" cx="32" cy="7" r="2.2" fill="url(#qyDot)"/></svg><span>青园在线</span></div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="secondhand.html" class="nav-link active">二手市场</a>
                <a href="life.html" class="nav-link">生活服务</a>
                <a href="booking.html" class="nav-link">场馆预约</a>
                <a href="parttime.html" class="nav-link">兼职互助</a>
                <a href="pets.html" class="nav-link">流浪猫寄养</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="sh-nav-links">
                    <a href="orders.html" class="sh-nav-link" title="我的订单"><i class="fas fa-receipt"></i></a>
                    <a href="purchases.html" class="sh-nav-link active" title="我的购买记录"><i class="fas fa-shopping-bag"></i></a>
                </div>
                <a href="login.html" class="login-btn">登录</a>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="sh-page-container">
        <div class="sh-order-header">
            <h1 class="sh-page-title sh-page-title-inline"><i class="fas fa-shopping-bag"></i> 我的购买记录</h1>
            <span id="purchaseCount" class="sh-order-count"></span>
        </div>
        <div id="purchaseList" class="sh-order-list"></div>
    </div>

    <div class="sh-toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg"></span>
    </div>

    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        function getCurrentUser() {
            if (window.CampusDB) return CampusDB.getCurrentUser();
            try { return JSON.parse(localStorage.getItem('campus_current_user') || 'null'); } catch(e) { return null; }
        }
        function showToast(msg) {
            var toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        var user = getCurrentUser();
        var listEl = document.getElementById('purchaseList');
        var countEl = document.getElementById('purchaseCount');

        /* 状态映射：适配购买场景 */
        var statusMap = {
            '待确认': { label: '待付款', cls: 'pending', icon: 'fa-clock' },
            '待配送': { label: '待收货', cls: 'shipped', icon: 'fa-truck' },
            '已收货': { label: '已收货', cls: 'completed', icon: 'fa-check-circle' },
            '已完成': { label: '已完成', cls: 'completed', icon: 'fa-check-double' },
            '已退款': { label: '已退款', cls: 'rejected', icon: 'fa-undo' },
            '已租用': { label: '已收货', cls: 'completed', icon: 'fa-check-circle' },
            '已归还': { label: '已完成', cls: 'completed', icon: 'fa-check-double' }
        };

        function renderPurchaseCard(order) {
            var st = statusMap[order.status] || { label: order.status || '待确认', cls: 'pending', icon: 'fa-circle' };
            var img = order.productImg || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop';
            var name = order.productName || order.name || '未知商品';
            var price = order.totalPrice || order.price || 0;
            var seller = order.seller || '未知';
            var sellerDept = order.sellerDept || '';
            var building = order.building || '';
            var note = order.note || '';
            var time = order.time || '';
            var status = order.status || '待确认';

            var card = document.createElement('div');
            card.className = 'sh-order-card';
            card.style.cursor = 'pointer';
            card.innerHTML =
                '<div class="sh-order-img"><img src="' + img + '" alt="' + escapeHtml(name) + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div style=&quot;display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:var(--bg-secondary);color:var(--text-secondary)&quot;><i class=&quot;fas fa-box&quot; style=&quot;font-size:24px&quot;></i></div>\'"></div>' +
                '<div class="sh-order-info">' +
                    '<h3>' + escapeHtml(name) + '</h3>' +
                    '<div class="sh-order-meta">' +
                        '<div><i class="fas fa-user"></i> 卖家：' + escapeHtml(seller) + (sellerDept ? '（' + escapeHtml(sellerDept) + '）' : '') + '</div>' +
                        '<div><i class="fas fa-coins"></i> 价格：<strong>¥' + price + '</strong></div>' +
                        (building ? '<div><i class="fas fa-map-marker-alt"></i> 收货地址：' + escapeHtml(building) + '</div>' : '') +
                        (note ? '<div><i class="fas fa-sticky-note"></i> 备注：' + escapeHtml(note) + '</div>' : '') +
                        (time ? '<div><i class="fas fa-clock"></i> 下单时间：' + escapeHtml(time) + '</div>' : '') +
                    '</div>' +
                '</div>' +
                '<span class="sh-order-status ' + st.cls + '"><i class="fas ' + st.icon + '"></i> ' + st.label + '</span>';

            if (order.productId) {
                card.addEventListener('click', function() {
                    window.location.href = 'detail.html?id=' + order.productId;
                });
            }
            return card;
        }

        function renderPurchases() {
            listEl.innerHTML = '';

            var orders = [];
            try { orders = JSON.parse(localStorage.getItem('campus_trade_orders') || '[]'); } catch(e) {}

            /* 只显示当前用户的购买记录 */
            var myOrders = orders.filter(function(o) {
                return o.buyerStuId === user.stuId || o.buyer === user.name;
            });

            if (myOrders.length === 0) {
                listEl.innerHTML = '<div class="sh-page-empty"><i class="fas fa-shopping-bag"></i><p>暂无购买记录</p><a href="secondhand.html">去逛逛</a></div>';
                if (countEl) countEl.textContent = '';
                return;
            }

            myOrders.forEach(function(order) {
                listEl.appendChild(renderPurchaseCard(order));
            });

            if (countEl) countEl.textContent = '共 ' + myOrders.length + ' 笔购买';
        }

        if (!user) {
            listEl.innerHTML = '<div class="sh-page-empty"><i class="fas fa-lock"></i><p>请先登录后查看购买记录</p><a href="login.html">去登录</a></div>';
            if (countEl) countEl.textContent = '';
            return;
        }

        renderPurchases();
    });
    </script>
<script src="js/robot-assistant.js"></script>
</body>
</html>
