﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/secondhand.css">
<link rel="stylesheet" href="css/robot-assistant.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo"><svg class="brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="青园在线"><defs><linearGradient id="qyArc" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#7DF0D9"/><stop offset="0.55" stop-color="#2DD4BF"/><stop offset="1" stop-color="#0891B2"/></linearGradient><radialGradient id="qyCore" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.6" stop-color="#A8F0E0"/><stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/></radialGradient><radialGradient id="qyDot" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#38BDF8"/></radialGradient></defs><circle class="brand-wave" cx="20" cy="20" r="16" stroke="url(#qyArc)" stroke-width="1.2" fill="none" opacity="0.4"/><path d="M9 14 H31" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><path d="M7 20 H33" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><path d="M9 26 H31" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><circle cx="20" cy="20" r="2.5" fill="url(#qyCore)" class="brand-core"/><circle class="brand-pulse" cx="32" cy="7" r="2.2" fill="url(#qyDot)"/></svg><span>青园在线</span></div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="secondhand.html" class="nav-link active">二手市场</a>
                <a href="life.html" class="nav-link">生活服务</a>
                <a href="booking.html" class="nav-link">场馆预约</a>
                <a href="parttime.html" class="nav-link">兼职互助</a><a href="pets.html" class="nav-link">流浪猫寄养</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="sh-nav-links">
                    <a href="orders.html" class="sh-nav-link" title="我的订单"><i class="fas fa-receipt"></i></a>
                    <a href="purchases.html" class="sh-nav-link" title="我的购买记录"><i class="fas fa-shopping-bag"></i></a>
                </div>
                <a href="login.html" class="login-btn">登录</a>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="sh-page-container">
        <div class="sh-fav-header">
            <div class="sh-fav-header-left">
                <h1 class="sh-page-title sh-page-title-inline"><i class="fas fa-heart"></i> 我的收藏</h1>
                <span id="favCount" class="sh-fav-count"></span>
            </div>
            <a href="secondhand.html" class="sh-fav-go-btn"><i class="fas fa-shopping-bag"></i> 去逛逛</a>
        </div>
        <div id="favList" class="sh-fav-list"></div>
    </div>

    <div class="sh-toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg"></span>
    </div>

    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        function getCurrentUser() {
            if (window.CampusDB) return CampusDB.getCurrentUser();
            try { return JSON.parse(localStorage.getItem('campus_current_user') || 'null'); } catch(e) { return null; }
        }
        function showToast(msg, type) {
            var toast = document.getElementById('toast');
            var icon = toast.querySelector('i');
            document.getElementById('toastMsg').textContent = msg;
            icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            toast.className = 'sh-toast ' + (type || 'success') + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }
        function getCollected() {
            try { return JSON.parse(localStorage.getItem('campus_collected') || '[]'); } catch(e) { return []; }
        }
        function saveCollected(list) {
            localStorage.setItem('campus_collected', JSON.stringify(list));
        }

        var user = getCurrentUser();
        var listEl = document.getElementById('favList');
        var countEl = document.getElementById('favCount');

        function updateCount() {
            var list = getCollected();
            countEl.textContent = '共 ' + list.length + ' 件收藏';
        }

        function renderFavorites() {
            var list = getCollected();
            updateCount();
            if (list.length === 0) {
                listEl.innerHTML = '<div class="sh-page-empty" style="grid-column:1/-1"><i class="far fa-heart"></i><p>暂无收藏商品</p><a href="secondhand.html">去二手市场逛逛</a></div>';
                return;
            }
            listEl.innerHTML = '';
            list.forEach(function(item) {
                var card = document.createElement('div');
                card.className = 'sh-fav-card';
                card.innerHTML = '<div class="sh-fav-card-img"><img src="' + item.img + '" alt="' + item.name + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div style=\\\'display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:var(--bg-secondary);color:var(--text-secondary)\\\'><i class=\\\'fas fa-image\\\' style=\\\'font-size:24px\\\'></i></div>\'"></div><div class="sh-fav-card-body"><h3>' + item.name + '</h3><div class="sh-fav-card-meta"><i class="fas fa-tag"></i> ' + (item.category || '其他') + ' · ' + (item.condition || '未填写') + ' · ' + item.seller + '</div><div class="sh-fav-card-price">¥' + item.price + '</div><div class="sh-fav-card-actions"><button class="sh-fav-view" data-id="' + item.productId + '"><i class="fas fa-eye"></i> 查看详情</button><button class="sh-fav-remove" data-id="' + item.productId + '"><i class="fas fa-heart-broken"></i> 取消收藏</button></div></div>';
                listEl.appendChild(card);
            });

            listEl.querySelectorAll('.sh-fav-view').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    window.location.href = 'detail.html?id=' + this.dataset.id;
                });
            });

            listEl.querySelectorAll('.sh-fav-remove').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var pid = parseInt(this.dataset.id);
                    var list = getCollected();
                    var idx = -1;
                    for (var i = 0; i < list.length; i++) {
                        if (list[i].productId === pid) { idx = i; break; }
                    }
                    if (idx >= 0) {
                        list.splice(idx, 1);
                        saveCollected(list);
                        showToast('已取消收藏');
                        renderFavorites();
                    }
                });
            });
        }

        if (!user || user.role !== 'student') {
            listEl.innerHTML = '<div class="sh-page-empty" style="grid-column:1/-1"><i class="fas fa-lock"></i><p>请先登录后查看收藏</p><a href="login.html">去登录</a></div>';
            countEl.textContent = '';
            return;
        }

        renderFavorites();
    });
    </script>
<script src="js/robot-assistant.js"></script>
</body>
</html>
