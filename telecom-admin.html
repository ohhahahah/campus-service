<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通信营业厅 - 业务员后台 - 青园在线</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/telecom-admin.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo"><svg class="brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="青园在线"><defs><linearGradient id="qyArc" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#7DF0D9"/><stop offset="0.55" stop-color="#2DD4BF"/><stop offset="1" stop-color="#0891B2"/></linearGradient><radialGradient id="qyCore" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.6" stop-color="#A8F0E0"/><stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/></radialGradient><radialGradient id="qyDot" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#38BDF8"/></radialGradient></defs><circle class="brand-wave" cx="20" cy="20" r="16" stroke="url(#qyArc)" stroke-width="1.2" fill="none" opacity="0.4"/><path d="M9 14 H31" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><path d="M7 20 H33" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><path d="M9 26 H31" stroke="url(#qyArc)" stroke-width="2.6" stroke-linecap="round"/><circle cx="20" cy="20" r="2.5" fill="url(#qyCore)" class="brand-core"/><circle class="brand-pulse" cx="32" cy="7" r="2.2" fill="url(#qyDot)"/></svg><span>青园在线</span></div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="life.html" class="nav-link">生活服务</a>
                <a href="telecom.html" class="nav-link active">通信营业厅</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <div class="ta-staff-badge"><i class="fas fa-headset"></i> 业务员后台</div>
            </div>
            <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="ta-hero">
        <div class="ta-hero-content">
            <h1><i class="fas fa-headset"></i> 业务员工作台</h1>
            <p>实时接收工单 · 一键接单 · 在线沟通 · 高效办结</p>
            <div class="ta-hero-stats">
                <div class="ta-stat">
                    <span class="ta-stat-num" id="statPending">0</span>
                    <span class="ta-stat-label">待接单</span>
                </div>
                <div class="ta-stat">
                    <span class="ta-stat-num" id="statAccepted">0</span>
                    <span class="ta-stat-label">已接单</span>
                </div>
                <div class="ta-stat">
                    <span class="ta-stat-num" id="statProcessing">0</span>
                    <span class="ta-stat-label">办理中</span>
                </div>
                <div class="ta-stat">
                    <span class="ta-stat-num" id="statDone">0</span>
                    <span class="ta-stat-label">已办结</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Tab切换 -->
    <section class="ta-tabs-section">
        <div class="ta-tabs-header">
            <button class="ta-tab active" data-tab="pending"><i class="fas fa-bell"></i><span>待接单</span><em id="pendingBadge" class="ta-badge">0</em></button>
            <button class="ta-tab" data-tab="accepted"><i class="fas fa-check-circle"></i><span>已接单</span></button>
            <button class="ta-tab" data-tab="processing"><i class="fas fa-cog"></i><span>办理中</span></button>
            <button class="ta-tab" data-tab="done"><i class="fas fa-flag-checkered"></i><span>业务办结</span></button>
        </div>
    </section>

    <!-- 工单列表 -->
    <div class="ta-tab-content active" id="pending">
        <div class="ta-container" id="pendingList"></div>
    </div>
    <div class="ta-tab-content" id="accepted">
        <div class="ta-container" id="acceptedList"></div>
    </div>
    <div class="ta-tab-content" id="processing">
        <div class="ta-container" id="processingList"></div>
    </div>
    <div class="ta-tab-content" id="done">
        <div class="ta-container" id="doneList"></div>
    </div>

    <!-- 聊天弹窗 -->
    <div class="ta-chat-modal" id="chatModal">
        <div class="ta-chat-content">
            <div class="ta-chat-header">
                <h3><i class="fas fa-comments"></i> 与学生沟通</h3>
                <button class="ta-chat-close" id="chatClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="ta-chat-messages" id="chatMessages"></div>
            <div class="ta-chat-input">
                <input type="text" id="chatInput" placeholder="输入消息...">
                <button id="chatSend"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="ta-toast" id="taToast">
        <i class="fas fa-check-circle"></i>
        <span id="taToastMsg">操作成功</span>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>青园在线</h3>
                <p>一站式校园服务平台</p>
            </div>
            <div class="footer-section">
                <h4>快速链接</h4>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="life.html">生活服务</a></li>
                    <li><a href="telecom.html">学生端</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>联系我们</h4>
                <p>地址：济南幼儿师范高等专科学校</p>
                <p>电话：010-12345678</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 青园在线综合服务平台</p>
        </div>
    </footer>

    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script src="js/telecom-admin.js"></script>
</body>
</html>
