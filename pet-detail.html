    <div class="pets-modal" id="adoptModal">
        <div class="pets-modal-content">
            <div class="pets-modal-header"><h3>申请领养</h3><button class="pets-modal-close" data-modal="adoptModal"><i class="fas fa-times"></i></button></div>
            <div class="pets-modal-body">
                <form id="adoptForm">
                    <div class="pets-form-group"><label>您的姓名</label><input type="text" id="adoptName" placeholder="请输入姓名" required></div>
                    <div class="pets-form-row">
                        <div class="pets-form-group"><label>联系电话</label><input type="tel" id="adoptPhone" placeholder="手机号" required></div>
                        <div class="pets-form-group"><label>微信号</label><input type="text" id="adoptWechat" placeholder="微信号"></div>
                    </div>
                    <div class="pets-form-group"><label>居住地址</label><input type="text" id="adoptAddress" placeholder="校内宿舍或校外住址" required></div>
                    <div class="pets-form-group"><label>养猫经验</label><select id="adoptExperience" required><option value="">请选择</option><option>有养猫经验</option><option>没有但了解相关知识</option><option>完全没有经验</option></select></div>
                    <div class="pets-form-group"><label>领养理由</label><textarea id="adoptReason" placeholder="请简述您想领养这只猫的原因" rows="3" required></textarea></div>
                    <div class="pets-form-group"><label class="checkbox-label"><input type="checkbox" id="adoptAgree" required> 我已阅读并同意《领养协议》，承诺科学喂养、定期疫苗、不弃养</label></div>
                    <button type="submit" class="pets-submit-btn"><i class="fas fa-hand-holding-heart"></i> 提交领养申请</button>
